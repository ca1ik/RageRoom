name: rage_app
description: "Rage Room — Developer Stress Relief Application."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # ── Physics Engine ──────────────────────────────────────────────────────────
  flame: ^1.32.0
  flame_forge2d: 0.19.0+6

  # ── State Management ────────────────────────────────────────────────────────
  flutter_bloc: ^8.1.5
  bloc: ^8.1.4
  get: ^4.6.6
  provider: ^6.1.2

  # ── Firebase ────────────────────────────────────────────────────────────────
  firebase_core: ^4.5.0
  firebase_auth: ^6.2.0
  cloud_firestore: ^6.1.3
  firebase_crashlytics: ^5.0.8
  google_sign_in: ^6.2.1

  # ── In-App Purchases (RevenueCat) ───────────────────────────────────────────
  purchases_flutter: ^9.14.0

  # ── UI / Animations ─────────────────────────────────────────────────────────
  flutter_animate: ^4.5.0
  lottie: ^3.1.0
  cupertino_icons: ^1.0.8

  # ── Networking ──────────────────────────────────────────────────────────────
  dio: ^5.4.3

  # ── Local Storage ───────────────────────────────────────────────────────────
  shared_preferences: ^2.2.3
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # ── Media ───────────────────────────────────────────────────────────────────
  image_picker: ^1.1.2
  audioplayers: ^6.1.0

  # ── Utilities ───────────────────────────────────────────────────────────────
  equatable: ^2.0.5
  dartz: ^0.10.1
  get_it: ^7.6.7
  injectable: ^2.3.2
  freezed_annotation: ^2.4.1
  json_annotation: ^4.8.1
  uuid: ^4.4.0
  intl: ^0.19.0
  logger: ^2.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  # ── Linting ─────────────────────────────────────────────────────────────────
  flutter_lints: ^4.0.0

dependency_overrides:
  forge2d: 0.14.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/audio/
    - assets/animations/
    - assets/data/

