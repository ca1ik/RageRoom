name: Android CI — Rage Room

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  FLUTTER_VERSION: '3.22.0'
  JAVA_VERSION: '17'

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # 1. Analiz + Test
  # ──────────────────────────────────────────────────────────────────────────
  analyze_and_test:
    name: Analyze & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Java kurulumu
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Flutter kurulumu
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Bağımlılıkları yükle
        working-directory: rage_app
        run: flutter pub get

      - name: Dart kod analizi
        working-directory: rage_app
        run: flutter analyze --fatal-infos

      - name: Birim testleri
        working-directory: rage_app
        run: flutter test --coverage

      - name: Kod kapsama raporu yükle
        uses: codecov/codecov-action@v4
        with:
          file: rage_app/coverage/lcov.info
          flags: flutter
        continue-on-error: true

  # ──────────────────────────────────────────────────────────────────────────
  # 2. APK Build (sadece main branch)
  # ──────────────────────────────────────────────────────────────────────────
  build_apk:
    name: Build Release APK
    runs-on: ubuntu-latest
    needs: analyze_and_test
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Java kurulumu
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Flutter kurulumu
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Bağımlılıkları yükle
        working-directory: rage_app
        run: flutter pub get

      - name: Kod üretimi (build_runner)
        working-directory: rage_app
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Release APK oluştur
        working-directory: rage_app
        run: flutter build apk --release --obfuscate --split-debug-info=.debug-info

      - name: APK'yı artifact olarak yükle
        uses: actions/upload-artifact@v4
        with:
          name: rage-room-release-apk
          path: rage_app/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
